# RFC 6902 JSON Patch operations applied to the target YAML file.
#
# This patch modifies the ArgoCD Application to:
#   1. Set the namespace to the configured namespace
#   2. Add a "managed-by: loom" label
#   3. Set the application name to the service name
#
# Values are templated — {{ .serviceName }} and {{ .namespace }} are
# replaced with parameters before the patch is applied.
#
# Usage in loom.yaml:
#   - name: patch-app
#     patch:
#       path: "__functions/patches/add-app.yaml"
#       target: "argocd/applicaton.yaml"

- op: add
  path: /spec/parameters/ClusterSecretStore/1/allowednamespace/-
  value: myloomtest
