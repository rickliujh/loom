apiVersion: loom.rickliujh.github.io/v1beta1
kind: Loom
metadata:
  name: onboard-service
spec:
  params:
    - name: serviceName
      required: true
    - name: namespace
      default: "default"
  target:
    url: "https://github.com/myorg/gitops-repo.git"
    branch: "main"
    featureBranch: "loom/onboard-{{ .serviceName }}"
  operations:
    - name: create-files
      newFiles:
        source: "."
        dest: ""
    - name: patch-app
      patch:
        engine: json6902
        path: "__functions/patches/add-app.yaml"
        target: "argocd/applicaton.yaml"
    - name: overlay-app
      patch:
        path: "__functions/patches/smp-overlay.yaml"
        target: "argocd/applicaton.yaml"
    - name: validate
      shell:
        command: "echo 'validating {{ .serviceName }} in {{ .namespace }}'"
        timeout: "30s"
    - name: commit
      commitPush:
        message: "feat: onboard {{ .serviceName }}"
        author: "loom-bot"
        email: "loom@example.com"
    - name: open-pr
      pr:
        provider: github
        title: "Onboard {{ .serviceName }}"
        baseBranch: main
        labels: [automated]
        tokenEnv: GITHUB_TOKEN
